services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: patchbay-web
    env_file:
      - path: ./apps/web/.env.local
        required: false
    environment:
      DATABASE_URL: postgres://patchbay:patchbay@postgres:5432/patchbay
      PATCHBAY_STORAGE: postgres
      PATCHBAY_LLM_PROVIDER: ${PATCHBAY_LLM_PROVIDER:-gemini}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      PATCHBAY_REQUIRE_ENROLLMENT_TOKEN: ${PATCHBAY_REQUIRE_ENROLLMENT_TOKEN:-true}
      PATCHBAY_REQUIRE_AGENT_TOKEN: ${PATCHBAY_REQUIRE_AGENT_TOKEN:-true}
      PATCHBAY_AGENT_TOKEN_TTL_MINUTES: ${PATCHBAY_AGENT_TOKEN_TTL_MINUTES:-1440}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: patchbay-postgres
    environment:
      POSTGRES_USER: patchbay
      POSTGRES_PASSWORD: patchbay
      POSTGRES_DB: patchbay
    ports:
      - "5432:5432"
    volumes:
      - patchbay-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patchbay -d patchbay"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  patchbay-postgres:
